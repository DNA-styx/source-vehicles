// 
// VEHICLE CONFIGURATION:
//  Allows you to configure your own vehicles.
//  Some properties are <required> while others are [optional].
//
// Properties:
//  <name>						- Translation key for the human-readable name of the vehicle (defined in vehicles.phrases.txt).
//  <model>						- Vehicle model. Omit the ".mdl" file extension if your model isn't included with the game and has to be downloaded by clients.
//  <script>					- Vehicle script path.
//  <type>						- Vehicle type.
//  							 - Possible values: car_wheels, car_raycast, jetski_raycast, airboat_raycast.
//  [dummy_model]				- Invisible model attached to the vehicle; it gives damage to players. Not needed in all games (def. "").
//  [passenger_model_version]	- The suffix to add at the end of the files names (before extension) when searching for custom player models used when they enter the vehicle (def. "").
//  [soundscript]				- Custom soundscript to load for this vehicle, requires the LoadSoundscript extension (def. "").
//  [skins]						- Vehicle model skin indexes, separated by commas (def. "0"). The last specified indes is the one used when the vehicle is destroyed.
//								 - If you specify only one index, the destroyed vehicle uses the index+1 value. For example, if 2 is the index specified, the destroyed vehicle uses index 3.
//  [key_hint]					- Key hint displayed to the player entering the vehicle (defined in vehicles.phrases.txt) (def. "").
//  [lock_speed]				- Vehicle must be going slower than this for player to enter or exit, in in/sec (def. "10.0").
//  [is_passenger_visible]		- Whether the vehicle driver is visible (def. "1").
//  [are_exitpoints_eyes]		- If "1" vehicle's exit points are considered as the player's eyes position, if "0" as player's feets position. (def. "0").
//  [horn_sound]				- Custom horn sound, supports looping sounds (def. "").
//  [downloads]					- List of files that should be added to the downloads table for clients to download. No need to specify the files related to "model", "dummy_model" and the custom player passenger models.
//
"Vehicles"
{
	"buggy"
	{
		"name"					"#Vehicle_HL2_Jeep"
		"model"					"models/vehicles/buggy_destroyable_beta1"
		"script"				"scripts/vehicles/jeep_test.txt"
		"type"					"car_wheels"
		"soundscript"			"scripts/game_sounds_vehicles.txt"
		"key_hint"				"#Hint_VehicleKeys_Car"
		"is_passenger_visible"	"0"
		"are_exitpoints_eyes"	"1"
		"downloads"
		{
			"0"	"materials/models/buggy/buggy001_destroyed_beta1.vmt"
			"1"	"materials/models/buggy/buggy001_destroyed_beta1.vtf"
			"2"	"materials/models/buggy/ammo_box_destroyed_beta1.vmt"
			"3"	"materials/models/buggy/ammo_box_destroyed_beta1.vtf"
		}
	}
	
	"airboat"
	{
		"name"					"#Vehicle_HL2_Airboat"
		"model"					"models/airboat.mdl"
		"script"				"scripts/vehicles/airboat.txt"
		"type"					"airboat_raycast"
		"key_hint"				"#Hint_VehicleKeys_Airboat"
		"is_passenger_visible"	"0"
	}
}